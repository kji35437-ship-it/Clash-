mixed-port: 7893
allow-lan: true
bind-address: "*"

mode: rule
log-level: warning

external-controller: 0.0.0.0:9090
skip-certificate-verification: true

tcp-concurrent: true
unified-delay: true
find-process-mode: strict
global-client-fingerprint: chrome

ipv6: false
geodata-mode: true

profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true

  listen: 127.0.0.1:7875

  ipv6: false

  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  use-hosts: true

  default-nameserver:
    - 223.5.5.5
    - 114.114.114.114

  nameserver:
    - https://223.5.5.5/dns-query
    - https://dns.alidns.com/dns-query

  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
    - tls://1.0.0.1:853

  fallback-filter:
    geoip: true
    geoip-code: CN

  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - time.windows.com
    - time.apple.com
    - stun.*
    - stun.*.*
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - geosite:cn

tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true

  dns-hijack:
    - any:53

proxy-providers:

  p1:
    type: http
    url: https://raw.githubusercontent.com/PuddinCat/BestClash/refs/heads/main/proxies.yaml
    path: ./proxy_provider/p1.yaml
    interval: 7200
    health-check:
      enable: true
      lazy: true
      url: https://www.gstatic.com/generate_204
      interval: 600

  p2:
    type: http
    url: https://raw.githubusercontent.com/chengaopan/AutoMergePublicNodes/master/list.meta.yml
    path: ./proxy_provider/p2.yaml
    interval: 7200
    health-check:
      enable: true
      lazy: true
      url: https://www.gstatic.com/generate_204
      interval: 600

  p3:
    type: http
    url: https://shz.al/JXxQ
    path: ./proxy_provider/p3.yaml
    interval: 7200
    health-check:
      enable: true
      lazy: true
      url: https://www.gstatic.com/generate_204
      interval: 600

  p4:
    type: http
    url: https://tg.wxgqlfx.fun/wxzl
    path: ./proxy_provider/p4.yaml
    interval: 7200
    health-check:
      enable: true
      lazy: true
      url: https://www.gstatic.com/generate_204
      interval: 600

  p5:
    type: http
    url: https://raw.githubusercontent.com/go4sharing/sub/main/sub.yaml
    path: ./proxy_provider/p5.yaml
    interval: 7200
    health-check:
      enable: true
      lazy: true
      url: https://www.gstatic.com/generate_204
      interval: 600

  p6:
    type: http
    url: https://proxy.v2gh.com/https://raw.githubusercontent.com/Pawdroid/Free-servers/main/sub
    path: ./proxy_provider/p6.yaml
    interval: 7200
    health-check:
      enable: true
      lazy: true
      url: https://www.gstatic.com/generate_204
      interval: 600

  p7:
    type: http
    url: https://raw.githubusercontent.com/a2470982985/getNode/main/clash.yaml
    path: ./proxy_provider/p7.yaml
    interval: 7200
    health-check:
      enable: true
      lazy: true
      url: https://www.gstatic.com/generate_204
      interval: 600

proxy-groups:

  - name: 🚀国外自动
    type: url-test

    use:
      - p1
      - p2
      - p3
      - p4
      - p5
      - p6
      - p7

    url: https://www.gstatic.com/generate_204

    interval: 600
    tolerance: 200
    lazy: true

    filter: "(?i)(SG|Singapore|新加坡|JP|Japan|日本|US|United States|美国|HK|Hong Kong|香港|TW|Taiwan|台湾|KR|Korea|韩国)"

  - name: 🚀手动
    type: select

    use:
      - p1
      - p2
      - p3
      - p4
      - p5
      - p6
      - p7

  - name: 🌍国外服务
    type: select

    proxies:
      - 🚀国外自动
      - 🚀手动

rules:

# 局域网
- IP-CIDR,127.0.0.0/8,DIRECT
