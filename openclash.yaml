mixed-port: 7893
allow-lan: true
bind-address: "*"

mode: rule
log-level: warning

external-controller: 0.0.0.0:9090
skip-certificate-verification: true

tcp-concurrent: true
unified-delay: true
find-process-mode: strict
global-client-fingerprint: chrome

ipv6: false
geodata-mode: true

profile:
  store-selected: true
  store-fake-ip: true

# ========= DNS 关键修复：不抢 53、国内用国内DNS =========
dns:
  enable: true
  listen: 127.0.0.1:7875   # 改 7875，不和系统 53 冲突
  default-nameserver:      # 新增：兜底用国内DNS
    - 223.5.5.5
    - 114.114.114.114
  ipv6: false
  enhanced-mode: redir-host  # 先不用 fake-ip，最稳
  # fake-ip-range: 198.18.0.1/16  # 暂时注释

  fake-ip-filter:
    - geosite:cn
    - '+.github.com'
    - '+.githubusercontent.com'
    - '+.githubassets.com'
    - '+.openai.com'
    - '+.chatgpt.com'
    - '+.youtube.com'
    - '+.googlevideo.com'

  nameserver:
    - https://223.5.5.5/dns-query
    - https://dns.alidns.com/dns-query

  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN

  use-hosts: true

tun:
  enable: false

proxy-providers:
  p1:
    type: http
    url: https://raw.githubusercontent.com/PuddinCat/BestClash/refs/heads/main/proxies.yaml
    path: ./proxy_provider/p1.yaml
    interval: 7200
    max-size: 30
    health-check:
      enable: true
      lazy: true
      url: https://www.gstatic.com/generate_204
      interval: 600

  p2:
    type: http
    url: https://raw.githubusercontent.com/chengaopan/AutoMergePublicNodes/master/list.meta.yml
    path: ./proxy_provider/p2.yaml
    interval: 7200
    max-size: 30
    health-check:
      enable: true
      lazy: true
      url: https://www.gstatic.com/generate_204
      interval: 600

  p3:
    type: http
    url: https://shz.al/JXxQ
    path: ./proxy_provider/p3.yaml
    interval: 7200
    max-size: 30
    health-check:
      enable: true
      lazy: true
      url: https://www.gstatic.com/generate_204
      interval: 600

  p4:
    type: http
    url: https://tg.wxgqlfx.fun/wxzl
    path: ./proxy_provider/p4.yaml
    interval: 7200
    max-size: 30
    health-check:
      enable: true
      lazy: true
      url: https://www.gstatic.com/generate_204
      interval: 600

  p5:
    type: http
    url: https://raw.githubusercontent.com/go4sharing/sub/main/sub.yaml
    path: ./proxy_provider/p5.yaml
    interval: 7200
    max-size: 30
    health-check:
      enable: true
      lazy: true
      url: https://www.gstatic.com/generate_204
      interval: 600

  p6:
    type: http
    url: https://proxy.v2gh.com/https://raw.githubusercontent.com/Pawdroid/Free-servers/main/sub
    path: ./proxy_provider/p6.yaml
    interval: 7200
    max-size: 30
    health-check:
      enable: true
      lazy: true
      url: https://www.gstatic.com/generate_204
      interval: 600

  p7:
    type: http
    url: https://raw.githubusercontent.com/a2470985/getNode/main/clash.yaml
    path: ./proxy_provider/p7.yaml
    interval: 7200
    max-size: 30
    health-check:
      enable: true
      lazy: true
      url: https://www.gstatic.com/generate_204
      interval: 600

proxy-groups:
  - name: 🚀手动选择
    type: select
    use:
      - p1
      - p2
      - p3
      - p4
      - p5
      - p6
      - p7
    filter: "(?i)(SG|JP|US|HK|TW|KR)"

  - name: 🚀自动选择
    type: url-test
    use:
      - p1
      - p2
      - p3
      - p4
      - p5
      - p6
      - p7
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    lazy: true
    filter: "(?i)(SG|JP|US|HK|TW|KR)"

  - name: 🌍国外节点
    type: select
    proxies:
      - 🚀自动选择
      - 🚀手动选择

  - name: 🎯Final
    type: select
    proxies:
      - 🌍国外节点
      - DIRECT

rules:
# 局域网直连
- IP-CIDR,192.168.0.0/16,DIRECT
- IP-CIDR,10.0.0.0/8,DIRECT
- IP-CIDR,172.16.0.0/12,DIRECT

# GitHub 走代理
- DOMAIN-SUFFIX,github.com,🌍国外节点
- DOMAIN-SUFFIX,githubusercontent.com,🌍国外节点

# 国内直连（核心）
- GEOIP,CN,DIRECT

# Apple 直连
- DOMAIN-SUFFIX,apple.com,DIRECT
- DOMAIN-SUFFIX,icloud.com,DIRECT

# 国外服务
- DOMAIN-SUFFIX,google.com,🌍国外节点
- DOMAIN-SUFFIX,youtube.com,🌍国外节点
- DOMAIN-SUFFIX,openai.com,🌍国外节点

# 兜底：所有没匹配到的→先国外，不行就直连（防断网）
- MATCH,🎯Final
