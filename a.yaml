mixed-port: 7893
allow-lan: true
bind-address: "*"
mode: rule
log-level: warning

external-controller: 0.0.0.0:9090
tcp-concurrent: true
unified-delay: true
find-process-mode: strict
global-client-fingerprint: chrome
ipv6: false

profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  listen: 127.0.0.1:7874
  ipv6: false

  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  use-hosts: true

  nameserver:
    - https://223.5.5.5/dns-query
    - https://dns.alidns.com/dns-query

  fallback:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN

tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true

  dns-hijack:
    - any:53

proxy-providers:

  p1:
    type: http
    url: https://raw.githubusercontent.com/PuddinCat/BestClash/refs/heads/main/proxies.yaml
    path: ./proxy_provider/p1.yaml
    interval: 7200
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 600

  p2:
    type: http
    url: https://raw.githubusercontent.com/chengaopan/AutoMergePublicNodes/master/list.meta.yml
    path: ./proxy_provider/p2.yaml
    interval: 7200
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 600

  p3:
    type: http
    url: https://shz.al/JXxQ
    path: ./proxy_provider/p3.yaml
    interval: 7200
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 600

  p4:
    type: http
    url: https://tg.wxgqlfx.fun/wxzl
    path: ./proxy_provider/p4.yaml
    interval: 7200
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 600

  p5:
    type: http
    url: https://raw.githubusercontent.com/go4sharing/sub/main/sub.yaml
    path: ./proxy_provider/p5.yaml
    interval: 7200
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 600

  p6:
    type: http
    url: https://proxy.v2gh.com/https://raw.githubusercontent.com/Pawdroid/Free-servers/main/sub
    path: ./proxy_provider/p6.yaml
    interval: 7200
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 600

  p7:
    type: http
    url: https://raw.githubusercontent.com/a2470982985/getNode/main/clash.yaml
    path: ./proxy_provider/p7.yaml
    interval: 7200
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 600

proxy-groups:

# 🚀 主入口
- name: 🚀自动
  type: select
  proxies:
    - 🧠智能核心
    - 🌐日用
    - DIRECT

# 🧠 核心容灾
- name: 🧠智能核心
  type: fallback
  use:
    - p1
    - p2
    - p3
    - p4
    - p5
    - p6
    - p7

  url: http://www.gstatic.com/generate_204
  interval: 600
  lazy: true

# 🌐 日常
- name: 🌐日用
  type: url-test

  use:
    - p1
    - p2
    - p3
    - p4
    - p5
    - p6
    - p7

  url: http://www.gstatic.com/generate_204
  interval: 600
  tolerance: 150
  lazy: true

  filter: "(?i)(JP|Japan|日本|SG|Singapore|新加坡|US|United States|美国|DE|Germany|德国|UK|英国)"

# 🎬 视频
- name: 🎬视频
  type: select

  use:
    - p1
    - p2
    - p3
    - p4
    - p5
    - p6
    - p7

  filter: "(?i)(JP|Japan|日本|SG|Singapore|新加坡|US|United States|美国)"

# 📱 TikTok
- name: 📱TikTok
  type: select

  use:
    - p1
    - p2
    - p3
    - p4
    - p5
    - p6
    - p7

  filter: "(?i)(JP|Japan|日本|SG|Singapore|新加坡|US|United States|美国)"

# 🐦 X
- name: 🐦X
  type: fallback

  use:
    - p1
    - p2
    - p3
    - p4
    - p5
    - p6
    - p7

  url: http://www.gstatic.com/generate_204
  interval: 600
  lazy: true

  filter: "(?i)(JP|Japan|日本|SG|Singapore|新加坡|US|United States|美国)"

# 🤖 AI
- name: 🤖AI
  type: select

  use:
    - p1
    - p2
    - p3
    - p4
    - p5
    - p6
    - p7

  filter: "(?i)(SG|Singapore|新加坡|US|United States|美国|JP|Japan|日本)"

