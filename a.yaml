mixed-port: 7893
allow-lan: true
bind-address: "*"

mode: rule
log-level: warning

external-controller: 0.0.0.0:9090

tcp-concurrent: true
unified-delay: true
find-process-mode: strict
global-client-fingerprint: chrome

keep-alive-idle: 600
keep-alive-interval: 30

ipv6: false
geodata-mode: true

profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true

  listen: 127.0.0.1:7874

  ipv6: false

  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  use-hosts: true

  nameserver:
    - https://223.5.5.5/dns-query
    - https://dns.alidns.com/dns-query

  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
    - https://dns.cloudflare.com/dns-query
    - tls://1.0.0.1:853

  fallback-filter:
    geoip: true
    geoip-code: CN

tun:
  enable: false

proxy-providers:

  p1:
    type: http
    url: https://raw.githubusercontent.com/PuddinCat/BestClash/refs/heads/main/proxies.yaml
    path: ./proxy_provider/p1.yaml
    interval: 7200
    health-check:
      enable: true
      lazy: true
      url: http://www.gstatic.com/generate_204
      interval: 600

  p2:
    type: http
    url: https://raw.githubusercontent.com/chengaopan/AutoMergePublicNodes/master/list.meta.yml
    path: ./proxy_provider/p2.yaml
    interval: 7200
    health-check:
      enable: true
      lazy: true
      url: http://www.gstatic.com/generate_204
      interval: 600

  p3:
    type: http
    url: https://shz.al/JXxQ
    path: ./proxy_provider/p3.yaml
    interval: 7200
    health-check:
      enable: true
      lazy: true
      url: http://www.gstatic.com/generate_204
      interval: 600

  p4:
    type: http
    url: https://tg.wxgqlfx.fun/wxzl
    path: ./proxy_provider/p4.yaml
    interval: 7200
    health-check:
      enable: true
      lazy: true
      url: http://www.gstatic.com/generate_204
      interval: 600

  p5:
    type: http
    url: https://raw.githubusercontent.com/go4sharing/sub/main/sub.yaml
    path: ./proxy_provider/p5.yaml
    interval: 7200
    health-check:
      enable: true
      lazy: true
      url: http://www.gstatic.com/generate_204
      interval: 600

  p6:
    type: http
    url: https://proxy.v2gh.com/https://raw.githubusercontent.com/Pawdroid/Free-servers/main/sub
    path: ./proxy_provider/p6.yaml
    interval: 7200
    health-check:
      enable: true
      lazy: true
      url: http://www.gstatic.com/generate_204
      interval: 600

  p7:
    type: http
    url: https://raw.githubusercontent.com/a2470982985/getNode/main/clash.yaml
    path: ./proxy_provider/p7.yaml
    interval: 7200
    health-check:
      enable: true
      lazy: true
      url: http://www.gstatic.com/generate_204
      interval: 600

proxy-groups:

# 主入口
- name: 🚀自动
  type: select
  proxies:
    - 🌐日用
    - 🧠智能核心
    - DIRECT

# 自动容灾
- name: 🧠智能核心
  type: fallback

  use:
    - p1
    - p2
    - p3
    - p4
    - p5
    - p6
    - p7

  url: http://www.gstatic.com/generate_204

  interval: 600
  lazy: true

# 日常自动测速
- name: 🌐日用
  type: url-test

  use:
    - p1
    - p2
    - p3
    - p4
    - p5
    - p6
    - p7

  url: http://www.gstatic.com/generate_204

  interval: 600
  tolerance: 150
  lazy: true

  filter: "(?i)(JP|Japan|日本|SG|Singapore|新加坡|US|United States|美国)"

# 视频
- name: 🎬视频
  type: select

  use:
    - p1
    - p2
    - p3
    - p4
    - p5
    - p6
    - p7

  filter: "(?i)(JP|Japan|日本|SG|Singapore|新加坡|US|United States|美国)"

# TikTok
- name: 📱TikTok
  type: select

  use:
    - p1
    - p2
    - p3
    - p4
    - p5
    - p6
    - p7

  filter: "(?i)(JP|Japan|日本|SG|Singapore|新加坡|US|United States|美国)"

# X/Twitter
- name: 🐦X
  type: fallback

  use:
    - p1
    - p2
    - p3
    - p4
    - p5
    - p6
    - p7

  url: http://www.gstatic.com/generate_204

  interval: 600
  lazy: true

# AI/GitHub
- name: 🤖AI
  type: url-test

  use:
    - p1
    - p2
    - p3
    - p4
    - p5
    - p6
    - p7

  url: http://www.gstatic.com/generate_204

  interval: 900
  tolerance: 100
  lazy: true

  filter: "(?i)(SG|Singapore|新加坡|JP|Japan|日本|US|United States|美国)"

rules:

