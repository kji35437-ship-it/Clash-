mixed-port: 7893
allow-lan: true
bind-address: "*"
log-level: warning
external-controller: 0.0.0.0:9090
tcp-concurrent: true
sni: true
ipv6: false
keep-alive-interval: 15
keep-alive-idle: 600

dns:
  enable: true
  listen: 0.0.0.0:53
  default-nameserver:
    - 223.5.5.5
    - 223.6.6.6
  nameserver:
    - 1.1.1.1
    - 8.8.8.8
  fallback:
    - https://dns.cloudflare.com/dns-query
    - https://dns.google/dns-query
  proxy-server-nameserver:
    - 1.1.1.1
    - 8.8.8.8
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true
  ipv6: false
  respect-rules: true
  fake-ip-filter:
    - geosite:cn

proxies: []

proxy-providers:
  自动最快:
    type: http
    url: https://raw.githubusercontent.com/PuddinCat/BestClash/refs/heads/main/proxies.yaml
    interval: 7200
    path: "./proxy_provider/zdkz.yaml"
    health-check:
      enable: true
      url: http://cp.cloudflare.com/generate_204
      interval: 600
  自动抓取免费节点:
    type: http
    url: https://raw.githubusercontent.com/chengaopan/AutoMergePublicNodes/master/list.meta.yml
    interval: 7200
    path: "./proxy_provider/mfjd.yaml"
    health-check:
      enable: true
      url: http://cp.cloudflare.com/generate_204
      interval: 600
  节点2:
    type: http
    url: https://raw.githubusercontent.com/go4sharing/sub/main/sub.yaml
    interval: 7200
    path: "./proxy_provider/node2.yaml"
    health-check:
      enable: true
      url: http://cp.cloudflare.com/generate_204
      interval: 600
  自动2:
    type: http
    url: https://proxy.v2gh.com/https://raw.githubusercontent.com/Pawdroid/Free-servers/main/sub
    interval: 7200
    path: "./proxy_provider/auto2.yaml"
    health-check:
      enable: true
      url: http://cp.cloudflare.com/generate_204
      interval: 600
  自动1:
    type: http
    url: https://raw.githubusercontent.com/a2470982985/getNode/main/clash.yaml
    interval: 7200
    path: "./proxy_provider/auto1.yaml"
    health-check:
      enable: true
      url: http://cp.cloudflare.com/generate_204
      interval: 600

proxy-groups:
- name: "\U0001F680自动"
  type: url-test
  use:
    - 自动最快
    - 自动抓取免费节点
    - 节点2
    - 自动2
    - 自动1
  filter: "(?i)(JP|Japan|日本|SG|Singapore|新加坡|US|United States|美国|DE|Germany|德国|UK|英国)"
  exclude-filter: "流量|过期|到期|官网|客服|邀请|返利|重置"
  url: http://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 80

- name: "\U0001F3AC视频"
  type: url-test
  use:
    - 自动最快
    - 自动抓取免费节点
    - 节点2
    - 自动2
    - 自动1
  filter: "(?i)(JP|Japan|日本|SG|Singapore|新加坡|US|United States|美国)"
  exclude-filter: "流量|过期|到期|官网|客服"
  url: https://www.gstatic.com/generate_204
  interval: 300
  tolerance: 100

- name: "\U0001F4F1TikTok"
  type: select
  use:
    - 自动最快
    - 自动抓取免费节点
    - 节点2
    - 自动2
    - 自动1
  filter: "(?i)(JP|Japan|日本|SG|Singapore|新加坡)"

- name: "\U0001F426X"
  type: url-test
  use:
    - 自动最快
    - 自动抓取免费节点
    - 节点2
    - 自动2
    - 自动1
  filter: "(?i)(JP|Japan|日本|SG|Singapore|新加坡|US|United States|美国)"
  exclude-filter: "流量|过期|到期|官网|客服"
  url: http://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50

