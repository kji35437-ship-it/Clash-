custom_proxy_group=🐟 漏网之鱼`select`[]DIRECT`[]🚀 节点选择

custom_proxy_group=👨🏿‍💻 GitHub`select`[]🚀 节点选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点
custom_proxy_group=🍀 Google`select`[]🚀 节点选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点
custom_proxy_group=📹 YouTube`select`[]🚀 节点选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点
custom_proxy_group=🎥 Netflix`select`[]🚀 节点选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点
custom_proxy_group=📲 Telegram`select`[]🚀 节点选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点

custom_proxy_group=🇭🇰 香港节点`select`(?=.*(香港|HK|Hong Kong))^((?!(家宽|游戏|流量)).)*$
custom_proxy_group=🇯🇵 日本节点`select`(?=.*(日本|东京|大阪|JP))^((?!(家宽|游戏|流量)).)*$
custom_proxy_group=🇸🇬 新加坡节点`select`(?=.*(新加坡|SG))^((?!(家宽|游戏|流量)).)*$
custom_proxy_group=🇺🇲 美国节点`select`(美国|US|United States)

custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

enable_rule_generator=true
overwrite_original_rules=true
